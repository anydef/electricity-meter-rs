name: Build and Publish

on:
  push:
  workflow_dispatch:

jobs:
  release:
    name: Cross-build and release
    runs-on: ubuntu-latest
    container:
      image: registry.lab.anydef.de/act-runner-rust:latest
    steps:
      - name: Verify runner image
        run: |
          echo "PATH=$PATH"
          echo "HOME=$HOME"
          echo "CARGO_HOME=${CARGO_HOME:-unset}"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-unset}"
          which cargo  && cargo --version  || echo "cargo missing"
          which cross  && cross --version  || echo "cross missing"
          which rustup && rustup show       || echo "rustup missing"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Load secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_CONNECT_HOST: ${{ vars.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_ENV_FILE: .env.tpl

      - name: Cross-build and package
        env:
          CARGO_BUILD: cargo
        run: make package

      - name: Upload binaries to Gitea release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: akkuman/gitea-release-action@v1
        with:
          files: dist/*.tar.gz
          token: ${{ env.GITEA_TOKEN }}

      - name: Publish crate to Gitea cargo registry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          _OP_LOADED: "1"
        run: make publish
