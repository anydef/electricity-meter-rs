name: Build and Publish

on:
  push:
  workflow_dispatch:

env:
  # Make cross use a custom target image (with cargo/rustup baked in) and skip
  # bind-mounting host's $CARGO_HOME, which doesn't translate through the
  # runner's DinD docker socket.
  CROSS_CUSTOM_TOOLCHAIN: "1"
  CROSS_TARGET_ARM_UNKNOWN_LINUX_MUSLEABI_IMAGE: registry.lab.anydef.de/cross-arm-unknown-linux-musleabi:latest

jobs:
  release:
    name: Cross-build and release
    runs-on: ubuntu-latest
    container:
      image: registry.lab.anydef.de/act-runner-rust:latest
    steps:
      - name: Debug workspace paths
        run: |
          echo "PWD=$PWD"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "--- /proc/mounts (workspace-related) ---"
          grep -E "workspace|gitea-runner-work|github" /proc/mounts || echo "no matches"
          echo "--- ls /mnt/user/appdata/gitea-runner-work ---"
          ls -la /mnt/user/appdata/gitea-runner-work 2>&1 || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cargo.toml resolves to a host-visible path
        run: |
          pwd
          ls -la
          echo "--- realpath ---"
          realpath .

      - name: Load secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_CONNECT_HOST: ${{ vars.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_ENV_FILE: .env.tpl

      - name: Cross-build and package
        run: make package

      - name: Upload binaries to Gitea release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: akkuman/gitea-release-action@v1
        with:
          files: dist/*.tar.gz
          token: ${{ env.GITEA_TOKEN }}

      - name: Publish crate to Gitea cargo registry
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          _OP_LOADED: "1"
        run: make publish
