name: Release electricity-meter-rs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Cross-build + Gitea release + cargo publish
    runs-on: rust-cross-arm-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | bash -s -- --to /usr/local/bin

      - name: Load secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_CONNECT_HOST: ${{ vars.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_ENV_FILE: .env.tpl

      - name: Bootstrap build-tools
        run: just _bootstrap

      - name: Cache cargo registry + target
        uses: https://github.com/Swatinem/rust-cache@v2
        with:
          key: arm-unknown-linux-musleabi

      - name: Build release binaries
        env:
          _OP_LOADED: "1"
        run: just ci-build

      - name: Package tarball
        env:
          _OP_LOADED: "1"
        run: just ci-package

      - name: Compute release tag
        id: tag
        run: echo "value=main-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload to Gitea release
        uses: https://github.com/akkuman/gitea-release-action@v1
        env:
          GITHUB_TOKEN: ${{ env.GITEA_TOKEN }}
        with:
          files: |-
            dist/*.tar.gz
          name: ${{ steps.tag.outputs.value }}
          tag_name: ${{ steps.tag.outputs.value }}

      - name: Publish crate
        env:
          _OP_LOADED: "1"
        run: just ci-publish
